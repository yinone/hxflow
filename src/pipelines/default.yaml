# Harness Workflow 默认流水线
#
# 覆盖顺序与命名规则见 src/contracts/pipeline-contract.md。
#
# 结构约束：
#   顶层必须包含 name 和 steps
#   steps 必须是非空数组
#   每个 step 必须包含 id、name、command
#   checkpoint.message 和 on_fail 为可选字段
#   on_fail 当前只允许 stop

name: 全自动流水线（主路径）

steps:
  - id: doc
    phase: Phase 01
    name: 需求文档
    command: hx-doc
    checkpoint:
      message: 展示生成的需求文档，等待用户确认内容正确后继续

  - id: plan
    phase: Phase 02
    name: 执行计划
    command: hx-plan
    checkpoint:
      message: 展示任务列表（TASK 数量、名称、层级），等待用户确认后继续

  - id: run
    phase: Phase 04
    name: 执行需求
    command: hx-run

  - id: check
    phase: Phase 06
    name: 核心检查
    command: hx-check

  - id: mr
    phase: Phase 08
    name: MR 描述
    command: hx-mr
