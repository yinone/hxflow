name: update-evals-accuracy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run hx tests
        id: run_tests
        shell: bash
        run: |
          set +e
          npm run hx:test 2>&1 | tee /tmp/hx-test-output.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Update evals.json
        env:
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const root = process.cwd()
          const evalsPath = path.join(root, 'evals.json')
          const logPath = '/tmp/hx-test-output.log'

          const base = JSON.parse(fs.readFileSync(evalsPath, 'utf8'))
          const log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : ''

          const passMatches = [...log.matchAll(/(\d+)\s+pass(?:ed)?/gi)]
          const failMatches = [...log.matchAll(/(\d+)\s+fail(?:ed)?/gi)]

          const passed = passMatches.length > 0 ? Number(passMatches.at(-1)[1]) : 0
          const failed = failMatches.length > 0 ? Number(failMatches.at(-1)[1]) : 0
          const total = passed + failed

          const fallbackTotal = total > 0 ? total : 1
          const fallbackPassed = total > 0 ? passed : (process.env.TEST_EXIT_CODE === '0' ? 1 : 0)
          const accuracy = Number(((fallbackPassed / fallbackTotal) * 100).toFixed(2))

          const updated = {
            ...base,
            updatedAt: new Date().toISOString(),
            metrics: {
              accuracy,
              passed: fallbackPassed,
              failed: fallbackTotal - fallbackPassed,
              total: fallbackTotal,
            },
            lastRun: {
              status: process.env.TEST_EXIT_CODE === '0' ? 'passed' : 'failed',
              exitCode: Number(process.env.TEST_EXIT_CODE ?? 1),
            },
          }

          fs.writeFileSync(evalsPath, `${JSON.stringify(updated, null, 2)}\n`, 'utf8')
          NODE

      - name: Commit evals.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals.json
          if git diff --cached --quiet; then
            echo "evals.json has no changes"
            exit 0
          fi
          git commit -m "chore: update evals accuracy"
          git push

      - name: Fail if tests failed
        if: steps.run_tests.outputs.exit_code != '0'
        run: |
          echo "hx:test failed"
          exit 1
