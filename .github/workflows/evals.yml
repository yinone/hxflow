name: update-evals-accuracy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run eval scenarios and update evals.json
        id: run_evals
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')
          const childProcess = require('node:child_process')

          try {
            const root = process.cwd()
            const evalsPath = path.join(root, 'evals.json')

            const base = JSON.parse(fs.readFileSync(evalsPath, 'utf8'))
            const suite = base.suite && typeof base.suite === 'object' ? base.suite : {}
            const cases = Array.isArray(suite.cases) ? suite.cases : []
            const hasCases = cases.length > 0

            let weightedPassed = 0
            let weightedTotal = 0
            let passed = 0
            let failed = 0
            const results = []

            for (const testCase of cases) {
              const command = Array.isArray(testCase.command) ? testCase.command : []
              if (command.length === 0 || typeof command[0] !== 'string') {
                failed += 1
                results.push({
                  id: testCase.id ?? null,
                  passed: false,
                  reason: 'invalid-command',
                  expectedExitCode: testCase.expect?.exitCode ?? 0,
                  actualExitCode: null,
                })
                weightedTotal += typeof testCase.weight === 'number' ? testCase.weight : 1
                continue
              }

              const expectedExitCode = Number.isInteger(testCase.expect?.exitCode) ? testCase.expect.exitCode : 0
              const weight = typeof testCase.weight === 'number' && testCase.weight > 0 ? testCase.weight : 1
              const run = childProcess.spawnSync(command[0], command.slice(1), {
                cwd: root,
                encoding: 'utf8',
              })

              const actualExitCode = typeof run.status === 'number' ? run.status : null
              const runPassed = actualExitCode === expectedExitCode

              if (runPassed) {
                passed += 1
                weightedPassed += weight
              } else {
                failed += 1
              }

              weightedTotal += weight
              results.push({
                id: testCase.id ?? null,
                passed: runPassed,
                expectedExitCode,
                actualExitCode,
              })
            }

            const total = hasCases ? passed + failed : null
            const accuracy = hasCases && weightedTotal > 0
              ? Number(((weightedPassed / weightedTotal) * 100).toFixed(2))
              : null
            const hasFailures = hasCases && failed > 0
            const exitCode = hasCases ? (hasFailures ? 1 : 0) : null
            const parseWarning = hasCases ? null : 'No eval scenarios configured in evals.json suite.cases'

            const updated = {
              ...base,
              updatedAt: new Date().toISOString(),
              metrics: {
                accuracy,
                passed,
                failed,
                total,
              },
              suite: {
                ...suite,
                runner: 'scenario',
                results,
              },
              lastRun: {
                status: exitCode === null ? 'unknown' : (exitCode === 0 ? 'passed' : 'failed'),
                exitCode,
                parseWarning,
              },
            }

            fs.writeFileSync(evalsPath, `${JSON.stringify(updated, null, 2)}\n`, 'utf8')
            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `exit_code=${exitCode === null ? '' : String(exitCode)}\n`)
            } else {
              console.log(`exit_code=${exitCode === null ? '' : String(exitCode)}`)
            }
          } catch (error) {
            console.error('Failed to update evals.json:', error)
            process.exit(1)
          }
          NODE

      - name: Commit evals.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals.json
          if git diff --cached --quiet; then
            echo "evals.json has no changes"
            exit 0
          fi
          git commit -m "chore: update evals accuracy"
          git push

      - name: Fail if evals failed
        if: steps.run_evals.outputs.exit_code != '0'
        run: |
          echo "Eval scenarios failed"
          exit 1
