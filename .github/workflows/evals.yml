name: update-evals-accuracy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run hx tests
        id: run_tests
        shell: bash
        run: |
          set +e
          npm run hx:test 2>&1 | tee /tmp/hx-test-output.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Update evals.json
        env:
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          function findSummaryCount(logText, kind) {
            const lines = logText.split('\n').map((line) => line.trim()).filter(Boolean)
            const pattern = kind === 'pass'
              ? /^(\d+)\s+pass(?:ed)?\b/i
              : /^(\d+)\s+fail(?:ed)?\b/i

            for (let index = lines.length - 1; index >= 0; index -= 1) {
              const match = lines[index].match(pattern)
              if (match) return Number(match[1])
            }
            return null
          }

          try {
            const root = process.cwd()
            const evalsPath = path.join(root, 'evals.json')
            const logPath = '/tmp/hx-test-output.log'

            const base = JSON.parse(fs.readFileSync(evalsPath, 'utf8'))
            const log = fs.existsSync(logPath) ? fs.readFileSync(logPath, 'utf8') : ''

            const passed = findSummaryCount(log, 'pass')
            const failed = findSummaryCount(log, 'fail')
            const total = passed !== null && failed !== null ? passed + failed : null
            const accuracy = total && total > 0 ? Number(((passed / total) * 100).toFixed(2)) : null

            const rawExitCode = process.env.TEST_EXIT_CODE
            const exitCode = rawExitCode === undefined || rawExitCode === '' ? null : Number(rawExitCode)
            const parseWarning = total === null
              ? 'Unable to parse final test pass/fail summary from bun output'
              : null

            const updated = {
              ...base,
              updatedAt: new Date().toISOString(),
              metrics: {
                accuracy,
                passed,
                failed,
                total,
              },
              lastRun: {
                status: exitCode === null ? 'unknown' : (exitCode === 0 ? 'passed' : 'failed'),
                exitCode,
                parseWarning,
              },
            }

            fs.writeFileSync(evalsPath, `${JSON.stringify(updated, null, 2)}\n`, 'utf8')
          } catch (error) {
            console.error('Failed to update evals.json:', error)
            process.exit(1)
          }
          NODE

      - name: Commit evals.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals.json
          if git diff --cached --quiet; then
            echo "evals.json has no changes"
            exit 0
          fi
          git commit -m "chore: update evals accuracy"
          git push

      - name: Fail if tests failed
        if: steps.run_tests.outputs.exit_code != '0'
        run: |
          echo "hx:test failed"
          exit 1
